<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Trail</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: #1D1735;
      overflow: hidden;
      cursor: none;
    }

    canvas {
      display: block;
    }

  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Mouse state
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let onPage = false;

    // Record actual mouse path with cumulative distances
    let totalDist = 0;
    let headDist = 0;   // springs toward totalDist — gives the gentle lag
    const TRAIL_LAG = 0.14; // how quickly head catches up (0=never, 1=instant)
    const pathHistory = [{ x: mouseX, y: mouseY, d: 0 }];
    const MAX_HISTORY = 8000;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      onPage = true;
      const last = pathHistory[pathHistory.length - 1];
      const dx = mouseX - last.x, dy = mouseY - last.y;
      const segLen = Math.sqrt(dx * dx + dy * dy);
      if (segLen > 2) {
        totalDist += segLen;
        pathHistory.push({ x: mouseX, y: mouseY, d: totalDist });
        if (pathHistory.length > MAX_HISTORY) pathHistory.shift();
      }
    });
    document.addEventListener('mouseleave', () => onPage = false);
    document.addEventListener('mouseenter', () => onPage = true);

    // Trail config
    const TRAIL_COUNT = 7;
    const CIRCLE_R = 5;       // 10px diameter
    const TRAIL_SPACING = 40; // px between dots along the path

    // Return point at absolute cumulative distance d (binary search)
    function pointAtAbsDist(d) {
      if (pathHistory.length < 2) return { x: pathHistory[0].x, y: pathHistory[0].y };
      d = Math.max(pathHistory[0].d, Math.min(d, pathHistory[pathHistory.length - 1].d));
      let lo = 0, hi = pathHistory.length - 1;
      while (lo < hi - 1) {
        const mid = (lo + hi) >> 1;
        if (pathHistory[mid].d <= d) lo = mid; else hi = mid;
      }
      const a = pathHistory[lo], b = pathHistory[hi];
      if (b.d === a.d) return { x: a.x, y: a.y };
      const t = (d - a.d) / (b.d - a.d);
      return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
    }

    // Placed circles (on click)
    const placed = [];

    document.addEventListener('click', e => {
      placed.push({
        x: e.clientX,
        y: e.clientY,
        birth: performance.now(),
        duration: 10000,
      });
    });

    function circlePath(cx, cy, r) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.closePath();
    }

    function animate(t) {
      requestAnimationFrame(animate);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Advance head toward the latest recorded position (spring on path)
      headDist += (totalDist - headDist) * TRAIL_LAG;

      if (onPage) {
        // Sample dots along the recorded path (back to front)
        for (let i = TRAIL_COUNT - 1; i >= 0; i--) {
          const pt = pointAtAbsDist(headDist - (i + 1) * TRAIL_SPACING);
          const frac = 1 - (i + 1) / TRAIL_COUNT; // 1 near cursor, 0 at tail
          const alpha = 0.25 + frac * 0.5;

          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = '#FAFAF2';
          circlePath(pt.x, pt.y, CIRCLE_R);
          ctx.fill();
          ctx.restore();
        }

        // Draw cursor circle
        ctx.save();
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = '#FAFAF2';
        circlePath(mouseX, mouseY, CIRCLE_R);
        ctx.fill();
        ctx.restore();
      }

      // Placed circles — compute live alpha for each
      const now = performance.now();
      const active = [];
      for (let i = placed.length - 1; i >= 0; i--) {
        const s = placed[i];
        const age = now - s.birth;
        if (age > s.duration) { placed.splice(i, 1); continue; }
        const HOLD = 5000;
        const alpha = age < HOLD
          ? 1.0
          : Math.max(0, 1 - (age - HOLD) / (s.duration - HOLD));
        active.push({ ...s, alpha });
      }

      // Draw connecting lines between all placed circles (in order placed)
      if (active.length > 1) {
        // Sort by birth so lines connect in placement order
        const sorted = [...active].sort((a, b) => a.birth - b.birth);
        for (let i = 0; i < sorted.length - 1; i++) {
          const a = sorted[i];
          const b = sorted[i + 1];
          const lineAlpha = Math.min(a.alpha, b.alpha);
          ctx.save();
          ctx.globalAlpha = lineAlpha * 0.6;
          ctx.strokeStyle = '#FAFAF2';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
          ctx.restore();
        }
      }

      // Draw each placed circle
      for (const s of active) {
        ctx.save();
        ctx.globalAlpha = s.alpha;
        ctx.fillStyle = '#FAFAF2';
        circlePath(s.x, s.y, CIRCLE_R);
        ctx.fill();
        ctx.restore();
      }
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
